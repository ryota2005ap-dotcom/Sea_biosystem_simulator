<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Marine Ecosystem - Advanced Simulation v2.1</title>
<style>
  body { margin: 0; background: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; overflow: hidden; height: 100vh; }
  
  /* Left UI Panel */
  #ui { padding: 15px; width: 260px; background: #222; height: 100vh; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 10; font-size: 13px; }
  
  /* Main Simulation Area */
  #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; position: relative; }
  canvas { border: 1px solid #444; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
  #sim { width: 500px; height: 500px; image-rendering: pixelated; }
  
  /* Right Charts Panel */
  .charts-container { display: flex; flex-direction: column; gap: 8px; padding: 10px; background: #222; width: 340px; overflow-y: auto; border-left: 1px solid #444; }
  .chart-box { background: #2a2a2a; border-radius: 6px; padding: 10px; border: 1px solid #333; }
  .chart-title { font-size: 11px; color: #0cf; margin-bottom: 6px; text-align: center; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  
  /* UI Elements */
  label { display: block; margin-top: 10px; font-size: 11px; color: #bbb; }
  .row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .row input[type="range"] { flex: 1; accent-color: #068; }
  .row input[type="number"] { width: 50px; background: #333; color: #fff; border: 1px solid #555; border-radius: 3px; padding: 2px; }
  
  .btn-group { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
  button { width: 100%; padding: 12px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; transition: all 0.2s; }
  #startBtn { background: #28a745; color: white; }
  #startBtn.running { background: #dc3545; }
  #resetBtn { background: #007bff; color: white; }
  button:hover { opacity: 0.8; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  
  b { color: #0cf; font-size: 14px; display: block; margin-top: 15px; border-bottom: 1px solid #444; padding-bottom: 5px; }
  .status-badge { position: absolute; top: 20px; left: 20px; padding: 5px 12px; background: rgba(0,0,0,0.7); border-radius: 20px; font-size: 12px; color: #0cf; border: 1px solid #0cf; }
</style>
</head>
<body>

<div id="ui">
  <b>INITIAL POPULATION</b>
  <label>Nutrient<input id="initN" type="number" value="200"></label>
  <label>Plankton<input id="initP" type="number" value="300"></label>
  <label>SmallFish<input id="initS" type="number" value="150"></label>
  <label>BigFish<input id="initB" type="number" value="50"></label>

  <b>BIRTH PROBABILITY</b>
  <label>P (Divide)<div class="row"><input id="splitP" type="range" min="0" max="1" step="0.01" value="0.8"><input id="splitP_num" type="number" value="0.8"></div></label>
  <label>S (Breed)<div class="row"><input id="splitS" type="range" min="0" max="1" step="0.01" value="0.4"><input id="splitS_num" type="number" value="0.4"></div></label>
  <label>B (Breed)<div class="row"><input id="splitB" type="range" min="0" max="1" step="0.01" value="0.2"><input id="splitB_num" type="number" value="0.2"></div></label>

  <b>DEATH PROBABILITY</b>
  <label>N (Decay)<div class="row"><input id="deathN" type="range" min="0" max="1" step="0.01" value="0.01"><input id="deathN_num" type="number" value="0.01"></div></label>
  <label>P (Natural)<div class="row"><input id="deathP" type="range" min="0" max="1" step="0.01" value="0.02"><input id="deathP_num" type="number" value="0.02"></div></label>
  <label>S (Natural)<div class="row"><input id="deathS" type="range" min="0" max="1" step="0.01" value="0.03"><input id="deathS_num" type="number" value="0.03"></div></label>
  <label>B (Natural)<div class="row"><input id="deathB" type="range" min="0" max="1" step="0.01" value="0.02"><input id="deathB_num" type="number" value="0.02"></div></label>

  <b>RESOURCE SOURCE</b>
  <label><input type="checkbox" id="srcTL" checked> Top Left</label>
  <label><input type="checkbox" id="srcTR" checked> Top Right</label>
  <label><input type="checkbox" id="srcBL" checked> Bottom Left</label>
  <label><input type="checkbox" id="srcBR" checked> Bottom Right</label>
  <label><input type="checkbox" id="srcC" checked> Center</label>

  <div class="btn-group">
    <button id="startBtn" onclick="toggleSim()">START</button>
    <button id="resetBtn" onclick="resetSim()">RESET SIMULATION</button>
  </div>
</div>

<div id="main">
  <div class="status-badge" id="status">Status: Paused</div>
  <canvas id="sim" width="400" height="400"></canvas>
</div>

<div class="charts-container">
  <div class="chart-box">
    <div class="chart-title">Population Ratio</div>
    <canvas id="pieChart" width="320" height="140"></canvas>
  </div>
  <div class="chart-box">
    <div class="chart-title">Water Level (Stacked Area)</div>
    <canvas id="lineChart" width="320" height="220"></canvas>
  </div>
  <div class="chart-box">
    <div class="chart-title">Growth Rate (Derivative)</div>
    <canvas id="diffChart" width="320" height="200"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const pctx = document.getElementById('pieChart').getContext('2d');
const lctx = document.getElementById('lineChart').getContext('2d');
const dctx = document.getElementById('diffChart').getContext('2d');
const startBtn = document.getElementById('startBtn');
const statusBadge = document.getElementById('status');

const GRID = 40;
const SIZE = canvas.width / GRID;
let agents = [];
let history = [];
const MAX_HISTORY = 100; 
const DIFF_GAP = 15;    
let isRunning = false;
let frame = 0;

const COLORS = {
  bigFish: '#ff4d4d',
  smallFish: '#ffae42',
  plankton: '#2ecc71',
  nutrient: '#3498db'
};
const KEYS = ['bigFish', 'smallFish', 'plankton', 'nutrient'];

function randPos() { return Math.floor(Math.random() * GRID); }

function toggleSim() {
  isRunning = !isRunning;
  startBtn.textContent = isRunning ? 'STOP' : 'START';
  startBtn.className = isRunning ? 'running' : '';
  statusBadge.textContent = isRunning ? 'Status: Running' : 'Status: Paused';
}

function resetSim() {
  agents = [];
  history = [];
  for(let i=0; i<+initN.value; i++) agents.push({x:randPos(), y:randPos(), type:'nutrient'});
  for(let i=0; i<+initP.value; i++) agents.push({x:randPos(), y:randPos(), type:'plankton'});
  for(let i=0; i<+initS.value; i++) agents.push({x:randPos(), y:randPos(), type:'smallFish'});
  for(let i=0; i<+initB.value; i++) agents.push({x:randPos(), y:randPos(), type:'bigFish'});
  
  if(!isRunning) toggleSim();
}

function bindPair(r, n) {
  r.oninput = () => n.value = r.value;
  n.oninput = () => { let v = Math.max(0, Math.min(1, n.value)); n.value = v; r.value = v; };
}
bindPair(splitP, splitP_num); bindPair(splitS, splitS_num); bindPair(splitB, splitB_num);
bindPair(deathN, deathN_num); bindPair(deathP, deathP_num); bindPair(deathS, deathS_num); bindPair(deathB, deathB_num);

function tryMove(a, currentMap) {
  if (Math.random() < 0.2) return; 
  const dirs = [[1,0], [-1,0], [0,1], [0,-1]].sort(() => Math.random() - 0.5);
  for (let d of dirs) {
    let nx = (a.x + d[0] + GRID) % GRID;
    let ny = (a.y + d[1] + GRID) % GRID;
    // 重なり制限の判定
    let key = nx + ',' + ny;
    if (currentMap[key] && currentMap[key].some(o => o.type === a.type)) continue;
    a.x = nx; a.y = ny;
    break;
  }
}

function update() {
  if(!isRunning) return;

  // 1. 供給
  const points = [
    {x:0, y:0, on:srcTL.checked}, {x:GRID-1, y:0, on:srcTR.checked},
    {x:0, y:GRID-1, on:srcBL.checked}, {x:GRID-1, y:GRID-1, on:srcBR.checked}, {x:20, y:20, on:srcC.checked}
  ];
  points.forEach(p => { if(p.on && Math.random() > 0.4) agents.push({x:p.x, y:p.y, type:'nutrient'}); });

  // 2. 移動のためのマップ作成
  let currentMap = {};
  agents.forEach(a => {
    let k = a.x + ',' + a.y;
    if (!currentMap[k]) currentMap[k] = [];
    currentMap[k].push(a);
  });
  agents.forEach(a => tryMove(a, currentMap));

  // 3. 相互作用
  let cellGroups = {};
  agents.forEach(a => {
    let k = a.x + ',' + a.y;
    if (!cellGroups[k]) cellGroups[k] = { nutrient:[], plankton:[], smallFish:[], bigFish:[] };
    cellGroups[k][a.type].push(a);
  });

  let nextAgents = [];
  for (let k in cellGroups) {
    let c = cellGroups[k];
    const interact = (preds, prey, prob, type) => {
      if (preds.length > 0 && prey.length > 0) {
        prey.pop(); // 捕食
        if (Math.random() < prob) {
          nextAgents.push({x: preds[0].x, y: preds[0].y, type: type}); // 繁殖
        }
      }
    };
    interact(c.plankton, c.nutrient, +splitP.value, 'plankton');
    interact(c.smallFish, c.plankton, +splitS.value, 'smallFish');
    interact(c.bigFish, c.smallFish, +splitB.value, 'bigFish');
    
    KEYS.forEach(type => nextAgents.push(...c[type]));
  }

  // 4. 自然死
  agents = nextAgents.filter(a => {
    let d = a.type === 'nutrient' ? +deathN.value : a.type === 'plankton' ? +deathP.value : a.type === 'smallFish' ? +deathS.value : +deathB.value;
    return Math.random() > d;
  });

  // 履歴保存
  const counts = { nutrient:0, plankton:0, smallFish:0, bigFish:0 };
  agents.forEach(a => counts[a.type]++);
  history.push(counts);
  if (history.length > MAX_HISTORY + DIFF_GAP) history.shift();
}

function draw() {
  ctx.clearRect(0, 0, 400, 400);
  // 背景にうっすらグリッド
  ctx.strokeStyle = "#f0f0f0";
  ctx.lineWidth = 0.5;
  for(let i=0; i<=GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i*SIZE, 0); ctx.lineTo(i*SIZE, 400); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i*SIZE); ctx.lineTo(400, i*SIZE); ctx.stroke();
  }

  agents.forEach(a => {
    ctx.fillStyle = COLORS[a.type];
    ctx.shadowBlur = a.type === 'nutrient' ? 0 : 2;
    ctx.shadowColor = COLORS[a.type];
    ctx.fillRect(a.x * SIZE + 1, a.y * SIZE + 1, SIZE - 2, SIZE - 2);
  });
  ctx.shadowBlur = 0;

  // --- Charts ---
  const pad = {l:40, r:15, t:20, b:25};
  const gw = 320 - pad.l - pad.r, gh_line = 220 - pad.t - pad.b, gh_diff = 200 - pad.t - pad.b;

  // 1. Pie Chart
  pctx.clearRect(0, 0, 320, 140);
  let total = agents.length || 1;
  let startAngle = -Math.PI/2;
  const latest = history[history.length-1] || { nutrient:0, plankton:0, smallFish:0, bigFish:0 };
  KEYS.forEach(k => {
    let ratio = latest[k] / total;
    if(ratio <= 0) return;
    pctx.beginPath(); pctx.moveTo(160, 70);
    pctx.arc(160, 70, 50, startAngle, startAngle + ratio * Math.PI * 2);
    pctx.fillStyle = COLORS[k]; pctx.fill();
    startAngle += ratio * Math.PI * 2;
  });

  // 2. Stacked Line (Population)
  lctx.clearRect(0, 0, 320, 220);
  let displayHistory = history.slice(-MAX_HISTORY);
  let maxTotal = 300;
  displayHistory.forEach(h => {
    let s = h.nutrient + h.plankton + h.smallFish + h.bigFish;
    if(s > maxTotal) maxTotal = s;
  });

  let bottom = new Array(displayHistory.length).fill(0);
  [...KEYS].reverse().forEach(k => {
    lctx.fillStyle = COLORS[k];
    lctx.beginPath();
    lctx.moveTo(pad.l, pad.t + gh_line);
    displayHistory.forEach((h, i) => {
      let x = pad.l + (i / (MAX_HISTORY-1)) * gw;
      let y = pad.t + gh_line - ((bottom[i] + h[k]) / maxTotal) * gh_line;
      lctx.lineTo(x, y);
    });
    for(let i=displayHistory.length-1; i>=0; i--){
      let x = pad.l + (i / (MAX_HISTORY-1)) * gw;
      let y = pad.t + gh_line - (bottom[i] / maxTotal) * gh_line;
      lctx.lineTo(x, y);
      bottom[i] += displayHistory[i][k];
    }
    lctx.fill();
  });
  // Axis
  lctx.strokeStyle = "#555";
  lctx.beginPath(); lctx.moveTo(pad.l, pad.t); lctx.lineTo(pad.l, pad.t + gh_line); lctx.lineTo(pad.l+gw, pad.t+gh_line); lctx.stroke();

  // 3. Diff Chart (Growth Rate)
  dctx.clearRect(0, 0, 320, 200);
  const zeroY = pad.t + gh_diff/2;
  dctx.strokeStyle = "#555";
  dctx.beginPath(); dctx.moveTo(pad.l, zeroY); dctx.lineTo(pad.l+gw, zeroY); dctx.stroke();

  if (history.length > DIFF_GAP) {
    KEYS.forEach(k => {
      dctx.strokeStyle = COLORS[k];
      dctx.lineWidth = 1.5;
      dctx.beginPath();
      let firstPoint = true;
      for(let i=0; i < displayHistory.length; i++) {
        let currIdx = history.length - displayHistory.length + i;
        let prevIdx = currIdx - DIFF_GAP;
        if(prevIdx < 0) continue;
        
        let diff = history[currIdx][k] - history[prevIdx][k];
        let x = pad.l + (i / (MAX_HISTORY-1)) * gw;
        let y = zeroY - (diff / 25) * (gh_diff/2);
        if(firstPoint) { dctx.moveTo(x, y); firstPoint = false; } else dctx.lineTo(x, y);
      }
      dctx.stroke();
    });
  }
}

function loop() {
  frame++;
  // 3フレームに1回計算（描画負荷軽減）
  if (frame % 3 === 0) update();
  draw();
  requestAnimationFrame(loop);
}

// 初期化
window.onload = () => {
  resetSim();
  // 初期状態は停止
  isRunning = false;
  startBtn.textContent = 'START';
  startBtn.className = '';
  statusBadge.textContent = 'Status: Paused';
  loop();
};
</script>
</body>
</html>
